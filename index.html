<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>PMA Knowledge Hub</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #f8f5f1;
      color: #202124;
    }

    main {
      width: 100%;
      max-width: 720px;
      padding: 48px;
      border-radius: 24px;
      text-align: center;
      background: #ffffff;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.12);
    }

    .logo {
      width: 72px;
      height: 72px;
      display: grid;
      place-items: center;
      margin: 0 auto 24px;
      border-radius: 20px;
      color: #ffffff;
      background: #a7192b;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: clamp(36px, 7vw, 64px);
    }

    h1 span {
      color: #a7192b;
    }

    p {
      margin: 18px 0 0;
      color: #6b7280;
      line-height: 1.7;
    }

    .status {
      display: inline-block;
      margin-top: 28px;
      padding: 10px 16px;
      border-radius: 999px;
      color: #166534;
      background: #dcfce7;
      font-weight: 700;
    }
  </style>
</head>

<body>
  <main>
    <div class="logo">PMA</div>

    <h1>
      PMA <span>Knowledge Hub</span>
    </h1>

    <p>
      Pusat pengetahuan dan pembelajaran internal
      PT Pinus Merah Abadi.
    </p>

    <div class="status">
      Website berhasil dijalankan
    </div>
  </main>
</body>
</html>
